name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Format check
        run: npx prettier --check .

      - name: Verify MCP server starts
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{}}' | timeout 5 npx tsx src/mcp.ts || true
